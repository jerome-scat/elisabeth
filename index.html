// Donut Chart simple SVG
const DonutChart = ({data,size=110}) => {
  const total = data.reduce((s,d)=>s+d.v,0);
  let cum = 0;
  const r=42, cx=55, cy=55, cir=2*Math.PI*r;
  const slices = data.map(d=>{
    const pct=d.v/total;
    const dash=pct*cir, offset=-cum*cir;
    cum+=pct;
    return {...d,dash,offset};
  });
  return (
    <svg width={size} height={size} viewBox="0 0 110 110">
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#161b24" strokeWidth="16"/>
      {slices.map((s,i)=>(
        <circle key={i} cx={cx} cy={cy} r={r} fill="none" stroke={s.c} strokeWidth="16"
          strokeDasharray={`${s.dash} ${cir-s.dash}`}
          strokeDashoffset={-s.offset+cir*0.25}
          transform={`rotate(-90 ${cx} ${cy})`}
          style={{transition:'stroke-dasharray .6s'}}/>
      ))}
      <text x={cx} y={cy-4} textAnchor="middle" fill="#e8eaf0" fontSize="11" fontFamily="Playfair Display,serif" fontWeight="700">
        {data.reduce((s,d)=>s+d.v,0)}%
      </text>
      <text x={cx} y={cy+8} textAnchor="middle" fill="#6b7491" fontSize="7" fontFamily="DM Mono,monospace">total</text>
    </svg>
  );
};

// Sparkline SVG
const Sparkline = ({values,color='#c9a96e',h=32}) => {
  if(!values||values.length<2) return null;
  const valid = values.filter(v=>v!=null);
  const min=Math.min(...valid), max=Math.max(...valid), range=max-min||1;
  const w=120;
  const pts = values.map((v,i)=>{
    const x=(i/(values.length-1))*w;
    const y=v!=null ? h-(v-min)/range*(h-4)-2 : null;
    return {x,y,v};
  }).filter(p=>p.y!=null);
  const d=pts.map((p,i)=>`${i===0?'M':'L'}${p.x},${p.y}`).join(' ');
  const fill=`${d} L${pts[pts.length-1].x},${h} L${pts[0].x},${h} Z`;
  return (
    <svg width={w} height={h} viewBox={`0 0 ${w} ${h}`} style={{overflow:'visible'}}>
      <path d={fill} fill={color} fillOpacity=".08"/>
      <path d={d} fill="none" stroke={color} strokeWidth="1.5" strokeLinecap="round" strokeLinejoin="round"/>
    </svg>
  );
};

const VueNews = ({entityFilter}) => {
  const [search,setSearch]=useState('');

  const tags=['Tous','Finance','Alerte','RH','Audit','RSE','IT','Bonne nouvelle'];

  const filtered = NEWS.filter(n=>{
    const matchEnt = entityFilter==='groupe' || n.entite===entityFilter || n.entite==='groupe';
    const matchSearch = !search || n.titre.toLowerCase().includes(search.toLowerCase()) || n.texte.toLowerCase().includes(search.toLowerCase());
    const matchTag = tagFilter==='Tous' || n.tag===tagFilter;
    return matchEnt && matchSearch && matchTag;
  });

  return (
    <div className="space-y-5 slide-up">
      <SectionTitle title="Actualités & Alertes" sub="Fil d'information contrôle de gestion"/>

      {/* Filtres */}

          style={{background:'#111318',border:'1px solid #1e2738',borderRadius:8,padding:'8px 14px',color:'#e8eaf0',fontSize:13,outline:'none',fontFamily:'DM Sans,sans-serif',width:220}}/>
        <div className="flex gap-2 flex-wrap">
          {tags.map(t=>(
            <button key={t} onClick={()=>setTagFilter(t)}

              {t}
            </button>
          ))}
        </div>
      </div>

      {/* News grid */}
      {filtered.length===0 && (
        <div className="text-center py-12" style={{color:'#6b7491',fontFamily:'DM Mono,monospace',fontSize:13}}>

          <span style={{fontFamily:'DM Mono,monospace',fontSize:10,color:'#6b7491',letterSpacing:'0.1em',textTransform:'uppercase',flexShrink:0}}>Entité :</span>
          {ENTITES.map(e=>(
            <button key={e.id} onClick={()=>{setEntity(e.id); if(view==='consolidee')setView('synthese');}}
              className="entity-chip"
              style={{padding:'4px 12px',fontSize:11,borderRadius:20,border:`1px solid ${entity===e.id?e.color:'#1e2738'}`,
                background:entity===e.id?e.color+'22':'transparent',
                color:entity===e.id?e.color:'#6b7491',
                fontFamily:'DM Mono,monospace',flexShrink:0,whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:5}}>
              <span>{e.icon}</span>
              <span>{e.label.split('—')[0].trim()}</span>
            </button>
          ))}
          {/* Bouton vue consolidée */}
          <button onClick={()=>setView('consolidee')}
            style={{marginLeft:'auto',padding:'4px 14px',fontSize:11,borderRadius:20,border:`1px solid ${view==='consolidee'?'#c9a96e':'#1e2738'}`,
              background:view==='consolidee'?'rgba(201,169,110,.2)':'transparent',
              color:view==='consolidee'?'#c9a96e':'#6b7491',fontFamily:'DM Mono,monospace',cursor:'pointer',flexShrink:0}}>
            ⊞ Toutes entités
          </button>
        </div>
      </header>

      {/* Main */}
      <main style={{padding:'28px 32px',maxWidth:1400,margin:'0 auto'}}>
        {view==='synthese' && <VueSynthese entity={entity} kpi={kpi} monthly={monthly} charges={charges} ecarts={ecarts}/>}
        {view==='analytique' && <VueAnalytique entity={entity}/>}
        {view==='consolidee' && <VueConsolidee/>}
        {view==='news' && <VueNews entityFilter={entity}/>}
      </main>

      {/* Footer */}
      <footer style={{borderTop:'1px solid #1e2738',padding:'16px 32px',display:'flex',justifyContent:'space-between',alignItems:'center',marginTop:20}}>
        <div style={{fontFamily:'DM Mono,monospace',fontSize:11,color:'#6b7491'}}>
          Elisabeth — Groupe social historique Luxembourg · Depuis 1672 · Contrôle de gestion consolidé 2024
        </div>
        <div style={{display:'flex',gap:12}}>
          {['SAP · Sage 100','Power BI','Excel · VBA','Multi-entités'].map(t=>(
            <span key={t} style={{padding:'3px 10px',border:'1px solid #1e2738',borderRadius:4,fontSize:10,fontFamily:'DM Mono,monospace',color:'#6b7491',textTransform:'uppercase',letterSpacing:'0.06em'}}>{t}</span>
          ))}
        </div>
      </footer>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
