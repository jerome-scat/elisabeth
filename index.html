var fmt = function(v,u){
  u=u||'M\u20AC';
  if(u==='M\u20AC') return v.toFixed(1)+'M\u20AC';
  if(u==='k\u20AC') return Math.round(v).toLocaleString('fr')+'k\u20AC';
  if(u==='%') return v.toFixed(1)+'%';
  if(u==='ETP') return v.toLocaleString('fr');
  if(u==='pers.') return v.toLocaleString('fr');
  return v;
};

var exportXLSX = function(rows, name){
  if(typeof XLSX==='undefined') return;
  var ws=XLSX.utils.aoa_to_sheet(rows);
  var wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Data');
  XLSX.writeFile(wb,(name||'export')+'.xlsx');
};

var DonutChart = function(props){
  var data=props.data, size=props.size||110;
  var colors=['#c9a96e','#6e9ec9','#52c97a','#e8a45a','#a78bfa'];
  var total=data.reduce(function(s,d){return s+d.v;},0);
  var cum=0, r=42, cx=55, cy=55, cir=2*Math.PI*r;
  var slices=data.map(function(d,idx){
    var pct=d.v/total;
    var dash=pct*cir, offset=-cum*cir;
    cum+=pct;
    return Object.assign({},d,{dash:dash,offset:offset,fc:colors[idx%colors.length]});
  });
  return React.createElement('svg',{width:size,height:size,viewBox:'0 0 110 110'},
    React.createElement('circle',{cx:cx,cy:cy,r:r,fill:'none',stroke:'var(--c-surface2)',strokeWidth:16}),
    slices.map(function(s,i){
      return React.createElement('circle',{key:i,cx:cx,cy:cy,r:r,fill:'none',stroke:s.fc,strokeWidth:16,
        strokeDasharray:s.dash+' '+(cir-s.dash),
        strokeDashoffset:-s.offset+cir*0.25,
        transform:'rotate(-90 '+cx+' '+cy+')',
        style:{transition:'stroke-dasharray .6s'}});
    }),
    React.createElement('text',{x:cx,y:cy-4,textAnchor:'middle',fill:'var(--c-text)',fontSize:11,fontFamily:'Playfair Display,serif',fontWeight:700},total+'%'),
    React.createElement('text',{x:cx,y:cy+8,textAnchor:'middle',fill:'var(--c-muted)',fontSize:7,fontFamily:'DM Mono,monospace'},'total')
  );
};

var Sparkline = function(props){
  var values=props.values, color=props.color||'var(--c-gold)', h=props.h||32;
  if(!values||values.length<2) return null;
  var valid=values.filter(function(v){return v!=null;});

  var _plView=useState('mensuel'), plView=_plView[0], setPlView=_plView[1];

    var cBudget=Math.round(pBudget*ratioCharges*(0.97+Math.random()*0.06));

var VueCarte = function(props){
  var entity=props.entity, theme=props.theme;
  var mapRef=useRef(null);
  var mapInstance=useRef(null);
  var tileRef=useRef(null);
  var markersRef=useRef([]);

  var filtered=entity==='groupe'?INSTITUTIONS:INSTITUTIONS.filter(function(inst){return inst.entity===entity;});
  var entCounts={};
  ENTITES.forEach(function(e){entCounts[e.id]=0;});
  INSTITUTIONS.forEach(function(inst){if(entCounts[inst.entity]!==undefined) entCounts[inst.entity]++;});

  useEffect(function(){
    if(!mapRef.current) return;
    if(mapInstance.current){mapInstance.current.remove();}

    var darkTile='https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png';
    var lightTile='https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png';

    var map=L.map(mapRef.current,{zoomControl:true,scrollWheelZoom:true}).setView([49.75,6.17],9);
    var tile=L.tileLayer(theme==='dark'?darkTile:lightTile,{
      attribution:'&copy; OpenStreetMap &copy; CARTO',maxZoom:18
    }).addTo(map);

    mapInstance.current=map;
    tileRef.current=tile;

    var maxBudget=Math.max.apply(null,INSTITUTIONS.map(function(inst){return inst.budget||100;}));
    filtered.forEach(function(inst){
      var ent=ENTITES.find(function(e){return e.id===inst.entity;});
      if(!ent) return;
      var sz=Math.max(18,Math.min(44,18+26*(inst.budget||200)/maxBudget));
      var icon=L.divIcon({
        className:'',
        html:'<div style="width:'+sz+'px;height:'+sz+'px;border-radius:50%;background:'+ent.color+';display:flex;align-items:center;justify-content:center;font-size:'+Math.round(sz*0.45)+'px;border:2px solid rgba(255,255,255,.3);box-shadow:0 2px 8px rgba(0,0,0,.3);opacity:0.85">'+ent.icon+'</div>',
        iconSize:[sz,sz],iconAnchor:[sz/2,sz/2]
      });
      var marker=L.marker([inst.lat,inst.lng],{icon:icon}).addTo(map);
      var popupHtml='<div style="font-family:DM Sans,sans-serif"><strong style="font-size:13px;color:'+ent.color+'">'+inst.name+'</strong><br/><span style="font-size:11px;opacity:.7">'+inst.loc+'</span><br/><span style="font-size:11px;opacity:.7">'+inst.tel+'</span>';
      if(inst.budget) popupHtml+='<br/><span style="font-size:11px;font-family:DM Mono,monospace;color:'+ent.color+';font-weight:600">Budget: '+inst.budget+'k\u20AC</span>';
      if(inst.eff) popupHtml+=' <span style="font-size:11px;font-family:DM Mono,monospace;opacity:.7">\u00B7 '+inst.eff+' ETP</span>';
      popupHtml+='<br/><span style="display:inline-block;margin-top:4px;padding:2px 8px;border-radius:12px;font-size:10px;background:'+ent.color+'22;color:'+ent.color+'">'+ent.label.split('\u2014')[0].trim()+'</span></div>';
      marker.bindPopup(popupHtml);
      markersRef.current.push(marker);
    });

    setTimeout(function(){map.invalidateSize();},200);

    return function(){
      if(mapInstance.current){mapInstance.current.remove();mapInstance.current=null;}
      markersRef.current=[];
    };
  },[entity,theme]);

  return React.createElement('div',{className:'space-y-4 slide-up'},
    React.createElement(SectionTitle,{title:'Carte des institutions',sub:filtered.length+' sites affich\u00E9s sur '+INSTITUTIONS.length}),
    React.createElement('div',{className:'grid grid-cols-7 gap-2'},
      ENTITES.filter(function(e){return e.id!=='groupe';}).map(function(e){
        return React.createElement('div',{key:e.id,className:'rounded-lg p-3 text-center',style:{background:'var(--c-surface)',border:'1px solid var(--c-border)'}},
          React.createElement('div',{style:{fontSize:18}},e.icon),
          React.createElement('div',{className:'font-mono text-lg font-bold',style:{color:e.color}},entCounts[e.id]),
          React.createElement('div',{className:'text-xs truncate',style:{color:'var(--c-muted)'}},e.label.split('\u2014')[0].trim())
        );
      })
    ),
    React.createElement('div',{ref:mapRef,style:{height:520,borderRadius:12,border:'1px solid var(--c-border)',position:'relative',zIndex:1}}),
    React.createElement('div',{className:'rounded-xl p-4',style:{background:'var(--c-surface)',border:'1px solid var(--c-border)'}},
      React.createElement('div',{className:'text-xs font-mono uppercase tracking-widest mb-3',style:{color:'var(--c-muted)'}},'L\u00E9gende'),
      React.createElement('div',{className:'flex flex-wrap gap-4'},
        ENTITES.filter(function(e){return e.id!=='groupe';}).map(function(e){
          return React.createElement('div',{key:e.id,className:'flex items-center gap-2'},
            React.createElement('div',{style:{width:12,height:12,borderRadius:'50%',background:e.color}}),
            React.createElement('span',{className:'text-xs',style:{color:'var(--c-text)'}},e.label.split('\u2014')[0].trim()),
            React.createElement('span',{className:'text-xs font-mono',style:{color:'var(--c-muted)'}},'('+entCounts[e.id]+')')
          );
        })
      )
    )
  );
};
